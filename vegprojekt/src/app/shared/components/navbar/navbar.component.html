<nav class="navbar">
  <div class="navbar-container">

    <!-- Nav links -->
    <ul class="navbar-links" [class.open]="menuOpen">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Főoldal</a></li>

      @if (auth.isLoggedIn()) {
        <li><a routerLink="/booking" routerLinkActive="active">Foglalás</a></li>
        <li><a routerLink="/gallery" routerLinkActive="active">Galéria</a></li>
        <li><a routerLink="/about" routerLinkActive="active">Rólunk</a></li>
      }
    </ul>

    <!-- Right side -->
    <div class="navbar-right">

      @if (auth.isLoggedIn()) {
        <!-- Kereső -->
        <div class="navbar-search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" placeholder="Keresés...">
        </div>

        <!-- Értesítő -->
        <button class="icon-btn" title="Értesítések">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>

        <!-- Profil avatar -->
        <a routerLink="/profile" class="navbar-avatar" title="Profil">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </a>

        <!-- Kijelentkezés -->
        <button class="auth-link-btn" (click)="logout()">Kijelentkezés</button>

      } @else {
        <!-- Bejelentkezés / Regisztráció -->
        <a routerLink="/login" class="auth-link-btn">Bejelentkezés</a>
        <a routerLink="/register" class="auth-link-btn primary">Regisztráció</a>
      }

      <!-- Hamburger (mobil) -->
      <button class="hamburger" (click)="toggleMenu()" title="Menü">
        <span></span><span></span><span></span>
      </button>

    </div>
  </div>
</nav>
