<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Regisztráció</h1>
    <p class="auth-subtitle">Hozz létre egy új fiókot!</p>

    <form class="auth-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Teljes név</label>
        <input
          id="name"
          type="text"
          placeholder="Kovács János"
          [(ngModel)]="name"
          name="name"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">E-mail cím</label>
        <input
          id="email"
          type="email"
          placeholder="pelda@email.com"
          [(ngModel)]="email"
          name="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Jelszó</label>
        <input
          id="password"
          type="password"
          placeholder="••••••••"
          [(ngModel)]="password"
          name="password"
          required
        />
      </div>

      <div class="form-group">
        <label for="passwordConfirm">Jelszó megerősítése</label>
        <input
          id="passwordConfirm"
          type="password"
          placeholder="••••••••"
          [(ngModel)]="passwordConfirm"
          name="passwordConfirm"
          required
        />
      </div>

      @if (error) {
        <p class="auth-error">{{ error }}</p>
      }

      <button type="submit" class="auth-btn" [disabled]="loading">
        {{ loading ? 'Betöltés...' : 'Regisztráció' }}
      </button>
    </form>

    <p class="auth-footer">
      Már van fiókod? <a routerLink="/login">Bejelentkezés</a>
    </p>
  </div>
</div>
