<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Új jelszó</h1>
    <p class="auth-subtitle">Add meg az új jelszavadat.</p>

    @if (!success) {
      <form class="auth-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="password">Új jelszó</label>
          <input
            id="password"
            type="password"
            placeholder="••••••••"
            [(ngModel)]="password"
            name="password"
            required
          />
        </div>

        <div class="form-group">
          <label for="passwordConfirm">Jelszó megerősítése</label>
          <input
            id="passwordConfirm"
            type="password"
            placeholder="••••••••"
            [(ngModel)]="passwordConfirm"
            name="passwordConfirm"
            required
          />
        </div>

        @if (error) {
          <p class="auth-error">{{ error }}</p>
        }

        <button type="submit" class="auth-btn" [disabled]="loading">
          {{ loading ? 'Mentés...' : 'Jelszó mentése' }}
        </button>
      </form>
    } @else {
      <p class="auth-success">Jelszavad sikeresen megváltozott!</p>
      <a routerLink="/login" class="auth-btn" style="display:block; text-align:center; margin-top:1rem; text-decoration:none;">
        Bejelentkezés
      </a>
    }
  </div>
</div>
