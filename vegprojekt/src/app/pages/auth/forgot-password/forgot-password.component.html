<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Elfelejtett jelszó</h1>
    <p class="auth-subtitle">Add meg az e-mail címed és küldünk egy visszaállítási linket.</p>

    @if (!success) {
      <form class="auth-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">E-mail cím</label>
          <input
            id="email"
            type="email"
            placeholder="pelda@email.com"
            [(ngModel)]="email"
            name="email"
            required
          />
        </div>

        @if (error) {
          <p class="auth-error">{{ error }}</p>
        }

        <button type="submit" class="auth-btn" [disabled]="loading">
          {{ loading ? 'Küldés...' : 'Link küldése' }}
        </button>
      </form>
    } @else {
      <p class="auth-success">Elküldtük a visszaállítási linket a megadott e-mail címre.</p>
    }

    <p class="auth-footer">
      <a routerLink="/login">← Vissza a bejelentkezéshez</a>
    </p>
  </div>
</div>
